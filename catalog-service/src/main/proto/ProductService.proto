syntax = "proto3";
option java_multiple_files = true;
package catalogService;

message ProductRequest{
  string code=1;
}

message ProductResponse{
  string code=1;
  string name=2;
  string description=3;
  string imageUrl=4;
  double price=5;
}

service ProductService{
  rpc GetProductByCode(ProductRequest) returns (ProductResponse);
}
