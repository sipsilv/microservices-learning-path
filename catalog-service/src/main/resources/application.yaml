spring:
  application:
    name: catalog-service

  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:15432/catalog-db}"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD:postgres}"
    driver-class-name: org.postgresql.Driver
server:
  port: 8081
  shutdown : graceful

grpc:
  server:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        include: "*"
catalog:
  page-size: 10
