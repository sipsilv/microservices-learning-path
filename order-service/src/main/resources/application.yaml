spring:
  application:
    name: order-service
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:25432/order-db}"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_USERNAME:postgres}"
  rabbitmq:
    host: "${RABBITMQ_HOST:localhost}"
    port: "${RABBITMQ_PORT:5672}"

    username: "${RABBITMQ_USERNAME:guest}"
    password: "${RABBITMQ_PASSWORD:guest}"

grpc:
  client:
    product-service:
      address: static://catalog-service:9090
      negotiationType: plaintext

server:
  port: 8082
  shutdown: graceful


orders:
  catalog-service-url: "http://localhost:8081"
  order-events-exchange: "orders-exchange"
  new-orders-queue: "new-orders"
  delivered-orders-queue: "delivered-orders"
  cancelled-orders-queue: "cancelled-orders"
  error-orders-queue: "error-orders"


management:
  endpoints:
    jmx:
      exposure:
        include: "*"


